<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>快速字卡區 | 醫院生存手冊</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy:  #0D1F3C;
      --red:   #E63946;
      --green: #6BAA75;
      --amber: #F4A261;
      --blue:  #457B9D;
      --teal:  #2A9D8F;
      --purple:#7B5EA7;
      --light: #F8FAFB;
      --border:#DDE3EA;
      --muted: #8899AA;
      --white: #FFFFFF;

      --acls:   #E63946;
      --drugs:  #F4A261;
      --labs:   #457B9D;
      --peds:   #6BAA75;
      --fluids: #2A9D8F;
    }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Noto Sans TC', 'Inter', sans-serif;
      background: var(--light);
      color: var(--navy);
      min-height: 100vh;
    }

    /* ── NAV ── */
    nav {
      position: sticky; top: 0; z-index: 200;
      background: rgba(13,31,60,0.97);
      backdrop-filter: blur(10px);
      padding: 0 5%;
      display: flex; align-items: center; gap: 20px;
      height: 56px;
      border-bottom: 1px solid rgba(255,255,255,0.07);
    }
    .nav-back {
      color: rgba(255,255,255,0.6);
      text-decoration: none;
      font-size: 0.8rem;
      font-weight: 500;
      display: flex; align-items: center; gap: 6px;
      transition: color 0.2s;
    }
    .nav-back:hover { color: #fff; }
    .nav-divider { color: rgba(255,255,255,0.2); font-size: 0.9rem; }
    .nav-title { color: #fff; font-size: 0.88rem; font-weight: 700; }
    .nav-actions { margin-left: auto; display: flex; gap: 10px; }
    .btn-sm {
      padding: 7px 16px; border-radius: 5px;
      font-size: 0.78rem; font-weight: 600;
      cursor: pointer; border: none;
      font-family: inherit; transition: all 0.2s;
    }
    .btn-outline {
      background: transparent;
      border: 1.5px solid rgba(255,255,255,0.25);
      color: rgba(255,255,255,0.8);
    }
    .btn-outline:hover { border-color: rgba(255,255,255,0.6); color: #fff; }
    .btn-primary { background: var(--red); color: #fff; }
    .btn-primary:hover { background: #c62834; }

    /* ── HERO STRIP ── */
    .page-hero {
      background: var(--navy);
      padding: 48px 6% 40px;
    }
    .page-hero h1 {
      font-size: clamp(1.6rem, 3vw, 2.4rem);
      font-weight: 900;
      color: #fff;
      margin-bottom: 8px;
    }
    .page-hero p {
      color: rgba(255,255,255,0.55);
      font-size: 0.88rem;
      max-width: 500px;
    }
    .hero-badges {
      display: flex; flex-wrap: wrap; gap: 8px;
      margin-top: 20px;
    }
    .badge {
      padding: 5px 14px;
      border-radius: 20px;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      cursor: pointer;
      border: 1.5px solid transparent;
      transition: all 0.18s;
    }
    .badge-acls   { background: rgba(230,57,70,0.15);  border-color: rgba(230,57,70,0.4);  color: #ff7680; }
    .badge-drugs  { background: rgba(244,162,97,0.15); border-color: rgba(244,162,97,0.4); color: #f4a261; }
    .badge-labs   { background: rgba(69,123,157,0.15); border-color: rgba(69,123,157,0.4); color: #7bb8d4; }
    .badge-peds   { background: rgba(107,170,117,0.15);border-color: rgba(107,170,117,0.4);color: #8fcf9a; }
    .badge-fluids { background: rgba(42,157,143,0.15); border-color: rgba(42,157,143,0.4); color: #4ecdc4; }
    .badge.active { opacity: 1 !important; }
    .badge:not(.active) { opacity: 0.5; }

    /* ── MAIN LAYOUT ── */
    .main-wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 40px 5% 80px;
    }

    /* ── TOPIC TABS ── */
    .topic-tabs {
      display: flex; gap: 8px; flex-wrap: wrap;
      margin-bottom: 32px;
    }
    .topic-tab {
      display: flex; align-items: center; gap: 7px;
      padding: 9px 18px;
      border-radius: 8px;
      border: 1.5px solid var(--border);
      background: var(--white);
      font-size: 0.82rem; font-weight: 600;
      cursor: pointer; transition: all 0.18s;
      font-family: inherit; color: var(--muted);
    }
    .topic-tab:hover { border-color: var(--navy); color: var(--navy); }
    .topic-tab.active-acls   { background: var(--acls);   border-color: var(--acls);   color: #fff; }
    .topic-tab.active-drugs  { background: var(--drugs);  border-color: var(--drugs);  color: #fff; }
    .topic-tab.active-labs   { background: var(--labs);   border-color: var(--labs);   color: #fff; }
    .topic-tab.active-peds   { background: var(--peds);   border-color: var(--peds);   color: #fff; }
    .topic-tab.active-fluids { background: var(--fluids); border-color: var(--fluids); color: #fff; }

    /* ── DECK STATUS BAR ── */
    .deck-status {
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: 12px;
      margin-bottom: 28px;
      padding: 14px 20px;
      background: var(--white);
      border: 1.5px solid var(--border);
      border-radius: 10px;
    }
    .deck-info { font-size: 0.82rem; color: var(--muted); }
    .deck-info strong { color: var(--navy); font-size: 1rem; }
    .progress-row { display: flex; align-items: center; gap: 10px; font-size: 0.78rem; color: var(--muted); }
    .progress-bar-wrap { width: 140px; height: 5px; background: var(--border); border-radius: 10px; overflow: hidden; }
    .progress-bar-fill { height: 100%; border-radius: 10px; transition: width 0.4s; }
    .deck-controls { display: flex; gap: 8px; }
    .ctrl-btn {
      padding: 6px 14px; border-radius: 6px; border: 1.5px solid var(--border);
      background: var(--white); font-size: 0.78rem; font-weight: 600;
      cursor: pointer; font-family: inherit; color: var(--navy);
      transition: all 0.18s;
    }
    .ctrl-btn:hover { background: var(--navy); color: #fff; border-color: var(--navy); }

    /* ── FLASHCARD ── */
    .card-stage {
      perspective: 1200px;
      margin-bottom: 20px;
    }
    .flashcard {
      width: 100%; min-height: 280px;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.5s cubic-bezier(0.4,0,0.2,1);
      cursor: pointer;
      border-radius: 16px;
    }
    .flashcard.flipped { transform: rotateY(180deg); }
    .card-face {
      position: absolute; inset: 0;
      backface-visibility: hidden;
      border-radius: 16px;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 40px 48px;
      text-align: center;
    }
    .card-front {
      background: var(--white);
      border: 2px solid var(--border);
      box-shadow: 0 4px 24px rgba(13,31,60,0.07);
    }
    .card-back {
      transform: rotateY(180deg);
      background: var(--navy);
      color: #fff;
    }

    .card-topic-tag {
      position: absolute; top: 18px; left: 22px;
      font-size: 0.68rem; font-weight: 700;
      letter-spacing: 0.1em; text-transform: uppercase;
      padding: 4px 10px; border-radius: 4px;
    }
    .card-num {
      position: absolute; top: 18px; right: 22px;
      font-size: 0.72rem; color: var(--muted);
      font-family: 'JetBrains Mono', monospace;
    }
    .card-hint {
      position: absolute; bottom: 18px;
      font-size: 0.7rem; opacity: 0.4;
      letter-spacing: 0.05em;
    }
    .front-term {
      font-size: clamp(1.3rem, 3vw, 2rem);
      font-weight: 900;
      line-height: 1.25;
      margin-bottom: 10px;
    }
    .front-sub {
      font-size: 0.82rem;
      color: var(--muted);
      font-style: italic;
    }
    .back-content {
      width: 100%;
      text-align: left;
    }
    .back-content h3 {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.4);
      margin-bottom: 16px;
      text-align: center;
    }
    .back-item {
      display: flex; align-items: flex-start; gap: 10px;
      margin-bottom: 10px;
      font-size: 0.87rem;
      line-height: 1.5;
      color: rgba(255,255,255,0.88);
    }
    .back-dot {
      width: 6px; height: 6px; border-radius: 50%;
      flex-shrink: 0; margin-top: 6px;
    }
    .back-value {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.82rem;
      color: #fff;
      background: rgba(255,255,255,0.1);
      padding: 2px 7px;
      border-radius: 4px;
      margin-left: 4px;
    }
    .back-warning {
      margin-top: 14px;
      padding: 10px 14px;
      background: rgba(230,57,70,0.2);
      border-left: 3px solid var(--red);
      border-radius: 0 6px 6px 0;
      font-size: 0.78rem;
      color: #ffb3b8;
      line-height: 1.5;
    }
    .back-tip {
      margin-top: 10px;
      padding: 10px 14px;
      background: rgba(107,170,117,0.2);
      border-left: 3px solid var(--green);
      border-radius: 0 6px 6px 0;
      font-size: 0.78rem;
      color: #a8e6b0;
      line-height: 1.5;
    }

    /* ── NAV BUTTONS ── */
    .nav-buttons {
      display: flex; align-items: center; justify-content: center; gap: 16px;
    }
    .nav-btn {
      width: 48px; height: 48px; border-radius: 50%;
      border: 2px solid var(--border);
      background: var(--white);
      font-size: 1.1rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.18s; color: var(--navy);
    }
    .nav-btn:hover:not(:disabled) { background: var(--navy); border-color: var(--navy); color: #fff; }
    .nav-btn:disabled { opacity: 0.3; cursor: default; }
    .nav-center { text-align: center; }
    .nav-fraction { font-size: 0.82rem; color: var(--muted); margin-bottom: 4px; font-family: 'JetBrains Mono', monospace; }
    .flip-prompt {
      font-size: 0.75rem; color: var(--muted);
      letter-spacing: 0.04em;
    }

    /* ── KEYBOARD HINT ── */
    .keyboard-hint {
      text-align: center;
      margin-top: 20px;
      font-size: 0.72rem;
      color: var(--muted);
    }
    kbd {
      background: var(--border);
      border-radius: 4px;
      padding: 2px 7px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      color: var(--navy);
      border: 1px solid #c5cdd6;
    }

    /* ── PRINT MODAL ── */
    .modal-overlay {
      display: none;
      position: fixed; inset: 0; z-index: 500;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(4px);
      align-items: center; justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--white);
      border-radius: 16px;
      padding: 36px;
      max-width: 480px; width: 90%;
      box-shadow: 0 24px 64px rgba(0,0,0,0.25);
    }
    .modal h2 { font-size: 1.2rem; font-weight: 800; margin-bottom: 8px; }
    .modal p  { font-size: 0.85rem; color: var(--muted); margin-bottom: 24px; line-height: 1.6; }
    .modal-topics {
      display: flex; flex-wrap: wrap; gap: 8px;
      margin-bottom: 24px;
    }
    .modal-topic-btn {
      padding: 8px 16px; border-radius: 6px;
      border: 1.5px solid var(--border);
      background: var(--white);
      font-size: 0.8rem; font-weight: 600;
      cursor: pointer; font-family: inherit;
      color: var(--muted); transition: all 0.15s;
    }
    .modal-topic-btn.sel-acls   { background: var(--acls);   border-color: var(--acls);   color: #fff; }
    .modal-topic-btn.sel-drugs  { background: var(--drugs);  border-color: var(--drugs);  color: #fff; }
    .modal-topic-btn.sel-labs   { background: var(--labs);   border-color: var(--labs);   color: #fff; }
    .modal-topic-btn.sel-peds   { background: var(--peds);   border-color: var(--peds);   color: #fff; }
    .modal-topic-btn.sel-fluids { background: var(--fluids); border-color: var(--fluids); color: #fff; }
    .modal-footer { display: flex; gap: 10px; justify-content: flex-end; }
    .btn-cancel {
      padding: 10px 20px; border-radius: 6px;
      border: 1.5px solid var(--border); background: var(--white);
      font-size: 0.82rem; font-weight: 600;
      cursor: pointer; font-family: inherit; color: var(--muted);
    }
    .btn-print {
      padding: 10px 24px; border-radius: 6px;
      background: var(--navy); color: #fff;
      border: none; font-size: 0.82rem; font-weight: 700;
      cursor: pointer; font-family: inherit;
      transition: background 0.2s;
    }
    .btn-print:hover { background: #1a3557; }

    /* ── PRINT STYLES ── */
    @media print {
      body * { visibility: hidden; }
      #print-area, #print-area * { visibility: visible; }
      #print-area {
        position: fixed; inset: 0;
        background: white;
        padding: 0;
      }
    }

    /* ── PRINT AREA (hidden until print) ── */
    #print-area { display: none; }

    .pocket-page {
      width: 210mm; /* A4 */
      padding: 10mm;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6mm;
      page-break-after: always;
    }
    .pocket-card {
      border: 1px solid #ccc;
      border-radius: 4mm;
      padding: 5mm 6mm;
      font-size: 8pt;
      line-height: 1.4;
      font-family: 'Noto Sans TC', sans-serif;
      break-inside: avoid;
    }
    .pocket-card-header {
      display: flex; align-items: center; gap: 3mm;
      padding-bottom: 3mm;
      border-bottom: 0.5mm solid #eee;
      margin-bottom: 3mm;
    }
    .pocket-card-dot {
      width: 5mm; height: 5mm; border-radius: 50%;
      flex-shrink: 0;
    }
    .pocket-card-title {
      font-weight: 700; font-size: 9pt;
    }
    .pocket-card-body p {
      margin-bottom: 2mm;
      font-size: 7.5pt;
    }
    .pocket-card-body strong { font-weight: 700; }
    .pocket-card-body .val {
      font-family: monospace;
      background: #f3f3f3;
      padding: 0 1mm;
      border-radius: 1mm;
    }
    .pocket-card-body .warn {
      background: #fff0f0;
      border-left: 1.5mm solid #e63946;
      padding: 1.5mm 2mm;
      margin-top: 2mm;
      border-radius: 0 1.5mm 1.5mm 0;
    }
    .pocket-card-back-note {
      font-size: 6.5pt;
      color: #888;
      text-align: center;
      margin-top: 2mm;
      border-top: 0.3mm dashed #ddd;
      padding-top: 2mm;
    }

    @media (max-width: 600px) {
      .card-face { padding: 32px 24px; }
      .front-term { font-size: 1.3rem; }
      .topic-tabs { gap: 6px; }
      .topic-tab { font-size: 0.76rem; padding: 7px 12px; }
    }
    @media (prefers-reduced-motion: reduce) {
      .flashcard { transition: none; }
    }
  </style>
</head>
<body>

<!-- NAV -->
<nav>
  <a href="index.html" class="nav-back">← 回首頁</a>
  <span class="nav-divider">/</span>
  <span class="nav-title">⚡ 快速字卡區</span>
  <div class="nav-actions">
    <button class="btn-sm btn-outline" id="shuffle-btn">🔀 隨機排序</button>
    <button class="btn-sm btn-primary" id="open-print-btn">🖨️ 列印口袋卡</button>
  </div>
</nav>

<!-- PAGE HERO -->
<div class="page-hero">
  <h1>⚡ 快速字卡區</h1>
  <p>點擊字卡翻面看解答。值班前快速複習，關鍵時刻不卡頓。</p>
  <div class="hero-badges">
    <span class="badge badge-acls active" data-topic="acls">🫀 ACLS</span>
    <span class="badge badge-drugs active" data-topic="drugs">💊 常用藥物劑量</span>
    <span class="badge badge-labs active" data-topic="labs">🔬 Lab Values</span>
    <span class="badge badge-peds active" data-topic="peds">👶 兒科公式</span>
    <span class="badge badge-fluids active" data-topic="fluids">💧 輸液選擇</span>
  </div>
</div>

<!-- MAIN -->
<div class="main-wrap">

  <!-- TOPIC TABS -->
  <div class="topic-tabs">
    <button class="topic-tab active-acls" data-topic="acls">🫀 ACLS</button>
    <button class="topic-tab" data-topic="drugs">💊 藥物劑量</button>
    <button class="topic-tab" data-topic="labs">🔬 Lab Values</button>
    <button class="topic-tab" data-topic="peds">👶 兒科公式</button>
    <button class="topic-tab" data-topic="fluids">💧 輸液選擇</button>
  </div>

  <!-- STATUS BAR -->
  <div class="deck-status">
    <div class="deck-info">
      <strong id="deck-title">ACLS 高級心肺復甦</strong>
      <div id="deck-count" style="margin-top:2px;">共 10 張</div>
    </div>
    <div class="progress-row">
      <span id="progress-label">0 / 10 已看</span>
      <div class="progress-bar-wrap">
        <div class="progress-bar-fill" id="progress-fill" style="width:0%; background:var(--acls);"></div>
      </div>
    </div>
    <div class="deck-controls">
      <button class="ctrl-btn" id="reset-btn">↺ 重置</button>
    </div>
  </div>

  <!-- FLASHCARD -->
  <div class="card-stage">
    <div class="flashcard" id="flashcard">
      <!-- Front -->
      <div class="card-face card-front">
        <span class="card-topic-tag" id="front-tag"></span>
        <span class="card-num" id="front-num"></span>
        <div class="front-term" id="front-term"></div>
        <div class="front-sub" id="front-sub"></div>
        <span class="card-hint">點擊翻面 →</span>
      </div>
      <!-- Back -->
      <div class="card-face card-back">
        <span class="card-topic-tag" id="back-tag"></span>
        <div class="back-content" id="back-content"></div>
        <span class="card-hint" style="color:rgba(255,255,255,0.3);">← 點擊返回</span>
      </div>
    </div>
  </div>

  <!-- NAV BUTTONS -->
  <div class="nav-buttons">
    <button class="nav-btn" id="prev-btn">←</button>
    <div class="nav-center">
      <div class="nav-fraction" id="nav-fraction">1 / 10</div>
      <div class="flip-prompt">Space 翻面　← → 切換</div>
    </div>
    <button class="nav-btn" id="next-btn">→</button>
  </div>

  <div class="keyboard-hint">
    <kbd>Space</kbd> 翻面　<kbd>←</kbd> 上一張　<kbd>→</kbd> 下一張　<kbd>S</kbd> 隨機排序
  </div>
</div>

<!-- PRINT MODAL -->
<div class="modal-overlay" id="print-modal">
  <div class="modal">
    <h2>🖨️ 列印口袋卡</h2>
    <p>選擇要列印的主題，輸出為 A4 紙張（每頁 2 欄），摺疊後可放入口袋隨身攜帶。</p>
    <div class="modal-topics" id="modal-topic-list">
      <button class="modal-topic-btn sel-acls" data-topic="acls">🫀 ACLS</button>
      <button class="modal-topic-btn sel-drugs" data-topic="drugs">💊 藥物劑量</button>
      <button class="modal-topic-btn sel-labs" data-topic="labs">🔬 Lab Values</button>
      <button class="modal-topic-btn sel-peds" data-topic="peds">👶 兒科公式</button>
      <button class="modal-topic-btn sel-fluids" data-topic="fluids">💧 輸液選擇</button>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" id="close-modal-btn">取消</button>
      <button class="btn-print" id="do-print-btn">列印 →</button>
    </div>
  </div>
</div>

<!-- HIDDEN PRINT AREA -->
<div id="print-area"></div>

<script>
// ══════════════════════════════════════════════
// CARD DATA
// ══════════════════════════════════════════════
const DECKS = {
  acls: {
    title: 'ACLS 高級心肺復甦',
    color: 'var(--acls)',
    colorHex: '#E63946',
    label: '🫀 ACLS',
    cards: [
      {
        term: 'VF / pVT\n心室顫動 / 無脈性室速',
        sub: 'Shockable rhythms',
        back: {
          title: '處理流程',
          items: [
            '立即 CPR 2 分鐘（30:2）',
            '盡快電擊：雙相 200J / 單相 360J',
            'Epinephrine 1mg IV/IO，每 3-5 分鐘一次',
            'Amiodarone 300mg IV（第一劑），150mg（第二劑）',
          ],
          warning: '電擊前確認所有人離開病人，不要中斷 CPR 超過 10 秒',
          tip: 'Shock → CPR → Rhythm check，每 2 分鐘一個循環'
        }
      },
      {
        term: 'Asystole / PEA\n心停止 / 無脈性電氣活動',
        sub: 'Non-shockable rhythms',
        back: {

// ══════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════
let currentTopic = 'acls';
let currentIndex = 0;
let isFlipped = false;
let seen = new Set();
let deck = [];

const TOPIC_COLORS = {
  acls: 'var(--acls)',
  drugs: 'var(--drugs)',
  labs: 'var(--labs)',
  peds: 'var(--peds)',
  fluids: 'var(--fluids)'
};

// ══════════════════════════════════════════════
// DOM REFS
// ══════════════════════════════════════════════
const flashcard   = document.getElementById('flashcard');
const frontTag    = document.getElementById('front-tag');
const backTag     = document.getElementById('back-tag');
const frontNum    = document.getElementById('front-num');
const frontTerm   = document.getElementById('front-term');
const frontSub    = document.getElementById('front-sub');
const backContent = document.getElementById('back-content');
const navFraction = document.getElementById('nav-fraction');
const prevBtn     = document.getElementById('prev-btn');
const nextBtn     = document.getElementById('next-btn');
const deckTitle   = document.getElementById('deck-title');
const deckCount   = document.getElementById('deck-count');
const progressLabel = document.getElementById('progress-label');
const progressFill  = document.getElementById('progress-fill');

// ══════════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════════
function loadTopic(topic) {
  currentTopic = topic;
  currentIndex = 0;
  isFlipped = false;
  seen = new Set();
  deck = [...DECKS[topic].cards];

  // tab styling
  document.querySelectorAll('.topic-tab').forEach(t => {
    t.className = 'topic-tab';
    if (t.dataset.topic === topic) t.classList.add('active-' + topic);
  });

  flashcard.classList.remove('flipped');
  updateCard();
  updateStatus();
}

function updateCard() {
  const d = DECKS[currentTopic];
  const card = deck[currentIndex];
  const color = d.color;

  // front
  frontTag.textContent = d.label;
  frontTag.style.background = 'rgba(0,0,0,0.06)';
  frontTag.style.color = d.colorHex;
  frontNum.textContent = `${currentIndex + 1} / ${deck.length}`;
  frontTerm.textContent = card.term;
  frontSub.textContent = card.sub || '';

  // back tag
  backTag.textContent = d.label;
  backTag.style.background = 'rgba(255,255,255,0.12)';
  backTag.style.color = 'rgba(255,255,255,0.7)';

  // back content
  const b = card.back;
  let html = `<h3>${b.title}</h3>`;
  b.items.forEach(item => {
    html += `<div class="back-item"><div class="back-dot" style="background:${d.color}"></div><span>${item}</span></div>`;
  });
  if (b.warning) html += `<div class="back-warning">⚠️ ${b.warning}</div>`;
  if (b.tip)     html += `<div class="back-tip">💡 ${b.tip}</div>`;
  backContent.innerHTML = html;

  // card back bg tint
  document.querySelector('.card-back').style.background = 'var(--navy)';

  navFraction.textContent = `${currentIndex + 1} / ${deck.length}`;
  prevBtn.disabled = currentIndex === 0;
  nextBtn.disabled = currentIndex === deck.length - 1;
}

function updateStatus() {
  const d = DECKS[currentTopic];
  deckTitle.textContent = d.title;
  deckCount.textContent = `共 ${deck.length} 張`;
  const s = seen.size;
  const total = deck.length;
  progressLabel.textContent = `${s} / ${total} 已看`;
  progressFill.style.width = (s / total * 100) + '%';
  progressFill.style.background = d.color;
}

// ══════════════════════════════════════════════
// INTERACTIONS
// ══════════════════════════════════════════════
flashcard.addEventListener('click', () => {
  isFlipped = !isFlipped;
  flashcard.classList.toggle('flipped', isFlipped);
  if (isFlipped) { seen.add(currentIndex); updateStatus(); }
});

function goNext() {
  if (currentIndex < deck.length - 1) {
    currentIndex++;
    isFlipped = false;
    flashcard.classList.remove('flipped');
    updateCard();
  }
}
function goPrev() {
  if (currentIndex > 0) {
    currentIndex--;
    isFlipped = false;
    flashcard.classList.remove('flipped');
    updateCard();
  }
}

nextBtn.addEventListener('click', goNext);
prevBtn.addEventListener('click', goPrev);

document.getElementById('shuffle-btn').addEventListener('click', () => {
  deck = [...deck].sort(() => Math.random() - 0.5);
  currentIndex = 0;
  isFlipped = false;
  seen = new Set();
  flashcard.classList.remove('flipped');
  updateCard();
  updateStatus();
});

document.getElementById('reset-btn').addEventListener('click', () => {
  deck = [...DECKS[currentTopic].cards];
  currentIndex = 0;
  isFlipped = false;
  seen = new Set();
  flashcard.classList.remove('flipped');
  updateCard();
  updateStatus();
});

document.querySelectorAll('.topic-tab').forEach(btn => {
  btn.addEventListener('click', () => loadTopic(btn.dataset.topic));
});

document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); flashcard.click(); }
  if (e.key === 'ArrowRight') goNext();
  if (e.key === 'ArrowLeft')  goPrev();
  if (e.key === 's' || e.key === 'S') document.getElementById('shuffle-btn').click();
});

// ══════════════════════════════════════════════
// PRINT MODAL
// ══════════════════════════════════════════════
const modal = document.getElementById('print-modal');
const printTopics = new Set(['acls','drugs','labs','peds','fluids']);

document.getElementById('open-print-btn').addEventListener('click', () => {
  modal.classList.add('open');
});
document.getElementById('close-modal-btn').addEventListener('click', () => {
  modal.classList.remove('open');
});
modal.addEventListener('click', e => {
  if (e.target === modal) modal.classList.remove('open');
});

document.querySelectorAll('.modal-topic-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const t = btn.dataset.topic;
    if (printTopics.has(t)) {
      printTopics.delete(t);
      btn.className = 'modal-topic-btn';
    } else {
      printTopics.add(t);
      btn.className = 'modal-topic-btn sel-' + t;
    }
  });
});

document.getElementById('do-print-btn').addEventListener('click', () => {
  buildPrintArea();
  modal.classList.remove('open');
  setTimeout(() => window.print(), 200);
});

function buildPrintArea() {
  const area = document.getElementById('print-area');
  area.innerHTML = '';
  area.style.display = 'block';

  const topics = [...printTopics];
  // collect all cards from selected topics
  let allCards = [];
  topics.forEach(t => {
    DECKS[t].cards.forEach(c => {
      allCards.push({ topic: t, card: c, color: DECKS[t].colorHex, label: DECKS[t].label });
    });
  });

  // group into pages of 4 cards (2x2 on A4)
  for (let i = 0; i < allCards.length; i += 4) {
    const page = document.createElement('div');
    page.className = 'pocket-page';
    for (let j = i; j < Math.min(i+4, allCards.length); j++) {
      const { card, color, label } = allCards[j];
      const b = card.back;
      const el = document.createElement('div');
      el.className = 'pocket-card';
      let itemsHtml = b.items.map(it => `<p>• ${it}</p>`).join('');
      let warnHtml = b.warning ? `<div class="warn">⚠️ ${b.warning}</div>` : '';
      let tipHtml  = b.tip     ? `<p style="color:#555;font-style:italic">💡 ${b.tip}</p>` : '';
      el.innerHTML = `
        <div class="pocket-card-header">
          <div class="pocket-card-dot" style="background:${color}"></div>
          <div class="pocket-card-title">${card.term.replace('\n','・')}</div>
        </div>
        <div class="pocket-card-body">
          <p style="font-weight:700;margin-bottom:3mm">${b.title}</p>
          ${itemsHtml}${warnHtml}${tipHtml}
        </div>
        <div class="pocket-card-back-note">${label} — 醫院生存手冊</div>
      `;
      page.appendChild(el);
    }
    area.appendChild(page);
  }
}

// ══════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════
loadTopic('acls');
</script>
