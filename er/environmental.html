  <style>
    .score-modal-overlay {
      display: none; position: fixed; inset: 0; z-index: 500;
      background: rgba(0,0,0,0.5); backdrop-filter: blur(4px);
      align-items: center; justify-content: center; padding: 20px;
    }
    .score-modal-overlay.open { display: flex; }
    .score-modal {
      background: var(--white); border-radius: 14px;
      width: 100%; max-width: 600px; max-height: 90vh;
      overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    }
    .score-modal-head {
      position: sticky; top: 0; background: var(--white);
      padding: 18px 22px 14px; border-bottom: 1.5px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .score-modal-head h2 { font-size: 1rem; font-weight: 800; }
    .score-modal-close {
      background: none; border: none; cursor: pointer;
      color: var(--muted); font-size: 1.1rem; padding: 4px;
      border-radius: 6px; transition: background 0.15s;
    }
    .score-modal-close:hover { background: var(--light); }
    .score-modal-body { padding: 20px 22px; }
  </style>

<script src="../shared.js"></script>
<script>
  function openModal(id) {
    document.getElementById(id).classList.add('open');
    document.body.style.overflow = 'hidden';
  }
  function closeModal(id) {
    document.getElementById(id).classList.remove('open');
    document.body.style.overflow = '';
  }
  document.querySelectorAll('.score-modal-overlay').forEach(overlay => {
    overlay.addEventListener('click', e => {
      if (e.target === overlay) closeModal(overlay.id);
    });
  });
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
      document.querySelectorAll('.score-modal-overlay.open').forEach(m => closeModal(m.id));
    }
  });

  const SEARCH_INDEX = [
    { id:'heat',        dept:'環境傷害', title:'熱傷害（熱痙攣、熱衰竭、熱中暑）', url:'#heat',        text:'', modalIds:[] },
    { id:'hypothermia', dept:'環境傷害', title:'低體溫症',                        url:'#hypothermia', text:'', modalIds:[] },
    { id:'frostbite',   dept:'環境傷害', title:'凍傷',                            url:'#frostbite',   text:'', modalIds:[] },
    { id:'drowning',    dept:'環境傷害', title:'溺水',                            url:'#drowning',    text:'', modalIds:[] },
    { id:'altitude',    dept:'環境傷害', title:'高山症（AMS、HACE、HAPE）',        url:'#altitude',    text:'', modalIds:[] },
    { id:'electrical',  dept:'環境傷害', title:'電傷 + 雷擊',                     url:'#electrical',  text:'', modalIds:[] },
    { id:'burns',       dept:'環境傷害', title:'燒傷（熱傷 + 吸入性損傷）',        url:'#burns',       text:'', modalIds:[] },
  ];

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', () => initSearch(SEARCH_INDEX));
  } else {
    initSearch(SEARCH_INDEX);
  }
</script>
