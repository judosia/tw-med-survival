  <style>
    .score-link {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 0.78rem; font-weight: 600;
      color: var(--blue); cursor: pointer;
      border-bottom: 1px dashed var(--blue);
      background: none; border-top: none; border-left: none; border-right: none;
      padding: 0; font-family: inherit; transition: color 0.15s;
    }
    .score-link:hover { color: var(--navy); border-bottom-color: var(--navy); }
    .score-modal-overlay {
      display: none; position: fixed; inset: 0; z-index: 500;
      background: rgba(0,0,0,0.5); backdrop-filter: blur(4px);
      align-items: center; justify-content: center; padding: 20px;
    }
    .score-modal-overlay.open { display: flex; }
    .score-modal {
      background: var(--white); border-radius: 14px;
      width: 100%; max-width: 640px; max-height: 90vh;
      overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    }
    .score-modal-head {
      position: sticky; top: 0; background: var(--white);
      padding: 18px 22px 14px; border-bottom: 1.5px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .score-modal-head h2 { font-size: 1rem; font-weight: 800; }
    .score-modal-close {
      background: none; border: none; cursor: pointer;
      color: var(--muted); font-size: 1.1rem; padding: 4px;
      border-radius: 6px; transition: background 0.15s;
    }
    .score-modal-close:hover { background: var(--light); }
    .score-modal-body { padding: 20px 22px; }
    .score-result {
      background: var(--light); border-radius: 8px;
      padding: 14px 16px; margin-top: 8px;
      font-size: 0.82rem; line-height: 1.65;
    }
  </style>
</head>

<script src="../shared.js"></script>
<script>
  function openModal(id) {
    document.getElementById(id).classList.add('open');
    document.body.style.overflow = 'hidden';
  }
  function closeModal(id) {
    document.getElementById(id).classList.remove('open');
    document.body.style.overflow = '';
  }
  document.querySelectorAll('.score-modal-overlay').forEach(overlay => {
    overlay.addEventListener('click', e => {
      if (e.target === overlay) closeModal(overlay.id);
    });
  });
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
      document.querySelectorAll('.score-modal-overlay.open').forEach(m => closeModal(m.id));
    }
  });

  const SEARCH_INDEX = [
    { id:'acute-abdomen',     dept:'一般外科', title:'急性腹痛評估',                url:'#acute-abdomen',     text:'', modalIds:[] },
    { id:'appendicitis',      dept:'一般外科', title:'急性闌尾炎',                  url:'#appendicitis',      text:'', modalIds:[] },
    { id:'bowel-obstruction', dept:'一般外科', title:'腸阻塞（SBO + LBO）',         url:'#bowel-obstruction', text:'', modalIds:[] },
    { id:'peritonitis',       dept:'一般外科', title:'腹膜炎 + 腸穿孔',            url:'#peritonitis',       text:'', modalIds:[] },
    { id:'biliary',           dept:'一般外科', title:'膽道疾病（膽囊炎 + 膽管炎）', url:'#biliary',           text:'', modalIds:[] },
    { id:'hernia',            dept:'一般外科', title:'疝氣（腹股溝 + 嵌頓）',      url:'#hernia',            text:'', modalIds:[] },
    { id:'gi-bleed-sx',       dept:'一般外科', title:'消化道出血外科處置',          url:'#gi-bleed-sx',       text:'', modalIds:[] },
    { id:'postop',            dept:'一般外科', title:'術後常見併發症',              url:'#postop',            text:'', modalIds:[] },
  ];

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', () => initSearch(SEARCH_INDEX));
  } else {
    initSearch(SEARCH_INDEX);
  }
</script>
