  <style>
    .score-link {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 0.78rem; font-weight: 600;
      color: var(--blue); cursor: pointer;
      border-bottom: 1px dashed var(--blue);
      background: none; border-top: none; border-left: none; border-right: none;
      padding: 0; font-family: inherit; transition: color 0.15s;
    }
    .score-link:hover { color: var(--navy); border-bottom-color: var(--navy); }
    .score-modal-overlay {
      display: none; position: fixed; inset: 0; z-index: 500;
      background: rgba(0,0,0,0.5); backdrop-filter: blur(4px);
      align-items: center; justify-content: center; padding: 20px;
    }
    .score-modal-overlay.open { display: flex; }
    .score-modal {
      background: var(--white); border-radius: 14px;
      width: 100%; max-width: 560px; max-height: 85vh;
      overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    }
    .score-modal-head {
      position: sticky; top: 0; background: var(--white);
      padding: 18px 22px 14px; border-bottom: 1.5px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .score-modal-head h2 { font-size: 1rem; font-weight: 800; }
    .score-modal-close {
      background: none; border: none; cursor: pointer;
      color: var(--muted); font-size: 1.1rem; padding: 4px;
      border-radius: 6px; transition: background 0.15s;
    }
    .score-modal-close:hover { background: var(--light); }
    .score-modal-body { padding: 20px 22px; }
    .score-result {
      background: var(--light); border-radius: 8px;
      padding: 14px 16px; margin-top: 8px;
      font-size: 0.82rem; line-height: 1.65;
    }
    .score-result strong { color: var(--navy); }
  </style>
</head>

<script src="../shared.js"></script>
<script>
  function openModal(id) {
    document.getElementById(id).classList.add('open');
    document.body.style.overflow = 'hidden';
  }
  function closeModal(id) {
    document.getElementById(id).classList.remove('open');
    document.body.style.overflow = '';
  }
  document.querySelectorAll('.score-modal-overlay').forEach(overlay => {
    overlay.addEventListener('click', e => {
      if (e.target === overlay) closeModal(overlay.id);
    });
  });
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
      document.querySelectorAll('.score-modal-overlay.open').forEach(m => closeModal(m.id));
    }
  });

  const SEARCH_INDEX = [
    { id:'lung-cancer',    dept:'腫瘤科', title:'肺癌（NSCLC + SCLC）',             url:'#lung-cancer',    text:'', modalIds:[] },
    { id:'breast-cancer',  dept:'腫瘤科', title:'乳癌',                             url:'#breast-cancer',  text:'', modalIds:[] },
    { id:'ovarian-cancer', dept:'腫瘤科', title:'卵巢癌',                           url:'#ovarian-cancer', text:'', modalIds:[] },
    { id:'prostate-cancer',dept:'腫瘤科', title:'攝護腺癌',                         url:'#prostate-cancer',text:'', modalIds:[] },
    { id:'crc',            dept:'腫瘤科', title:'大腸直腸癌（CRC）',                 url:'#crc',            text:'', modalIds:[] },
    { id:'pancreatic',     dept:'腫瘤科', title:'胰臟癌',                           url:'#pancreatic',     text:'', modalIds:[] },
    { id:'hcc',            dept:'腫瘤科', title:'肝細胞癌（HCC）+ 胃食道癌',         url:'#hcc',            text:'', modalIds:[] },
    { id:'melanoma-cns',   dept:'腫瘤科', title:'黑色素瘤 + CNS 腫瘤',              url:'#melanoma-cns',   text:'', modalIds:[] },
    { id:'onc-emergency',  dept:'腫瘤科', title:'腫瘤急症（FN + 脊髓壓迫 + TLS）',  url:'#onc-emergency',  text:'', modalIds:[] },
    { id:'chemo-toxicity', dept:'腫瘤科', title:'化療副作用',                       url:'#chemo-toxicity', text:'', modalIds:[] },
  ];

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', () => initSearch(SEARCH_INDEX));
  } else {
    initSearch(SEARCH_INDEX);
  }
</script>
