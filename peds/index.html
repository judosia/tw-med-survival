<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>兒科 | 醫院生存 note</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../shared.css"/>
  <style>
    body { padding-top: var(--nav-h); }
    .simple-nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 300;
      background: rgba(13,31,60,0.97); backdrop-filter: blur(10px);
      height: var(--nav-h); padding: 0 5%;
      display: flex; align-items: center; gap: 12px;
      border-bottom: 1px solid rgba(255,255,255,0.07);
    }
    .entry-wrap { max-width: 860px; margin: 0 auto; padding: 48px 5% 100px; }
    .entry-hero { margin-bottom: 44px; }
    .entry-hero h1 { font-size: clamp(1.6rem, 3vw, 2.2rem); font-weight: 900; color: var(--navy); margin-bottom: 8px; }
    .entry-hero p  { font-size: 0.88rem; color: var(--muted); max-width: 480px; line-height: 1.7; }

    .dept-block { margin-bottom: 36px; }
    .dept-block-head {
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 16px; padding-bottom: 12px;
      border-bottom: 2px solid var(--border);
    }
    .dept-icon {
      width: 34px; height: 34px; border-radius: 8px;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .dept-icon svg { width: 17px; height: 17px; }
    .dept-name { font-size: 1rem; font-weight: 800; }

    .sub-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; }
    .sub-card {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 16px; background: var(--white);
      border: 1.5px solid var(--border); border-radius: 10px;
      text-decoration: none; transition: all 0.18s; color: var(--navy);
    }
    .sub-card:hover { border-color: var(--green); box-shadow: 0 4px 14px rgba(107,170,117,0.15); transform: translateY(-1px); }
    .sub-card.disabled { opacity: 0.4; pointer-events: none; }
    .sub-card-icon {
      width: 32px; height: 32px; border-radius: 6px;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .sub-card-icon svg { width: 16px; height: 16px; }
    .sub-card-name  { font-size: 0.88rem; font-weight: 700; margin-bottom: 2px; }
    .sub-card-count { font-size: 0.72rem; color: var(--muted); }
    .sub-card-arrow { color: var(--muted); font-size: 0.8rem; margin-left: auto; transition: transform 0.15s; }
    .sub-card:hover .sub-card-arrow { transform: translateX(3px); color: var(--green); }
    .color-peds { background: rgba(107,170,117,0.12); color: #3d8a4a; }
  </style>
</head>
<body>

<nav class="simple-nav">
  <a href="../index.html" class="nav-back">← 首頁</a>
  <span class="nav-sep">/</span>
  <a href="../specialty.html" class="nav-back">分科知識</a>
  <span class="nav-sep">/</span>
  <span class="nav-current">兒科</span>
</nav>

<div class="entry-wrap">
  <div class="entry-hero">
    <h1>兒科 Pediatrics</h1>
    <p>兒科不是縮小版的成人科。選擇次專科，進入對應的知識頁面。</p>
  </div>

  <div class="dept-block">
    <div class="dept-block-head">
      <div class="dept-icon color-peds">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M6 20v-2a4 4 0 0 1 4-4h4a4 4 0 0 1 4 4v2"/></svg>
      </div>
      <span class="dept-name">兒科 Pediatrics</span>
    </div>
    <div class="sub-grid">
      <a href="general.html" class="sub-card">
        <div class="sub-card-icon color-peds">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
        </div>
        <div>
          <div class="sub-card-name">一般兒科</div>
          <div class="sub-card-count">13 個主題</div>
        </div>
        <span class="sub-card-arrow">›</span>
      </a>
      <div class="sub-card disabled">
        <div class="sub-card-icon color-peds">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
        </div>
        <div>
          <div class="sub-card-name">新生兒科</div>
          <div class="sub-card-count">即將推出</div>
        </div>
      </div>
      <div class="sub-card disabled">
        <div class="sub-card-icon color-peds">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
        </div>
        <div>
          <div class="sub-card-name">兒科急診</div>
          <div class="sub-card-count">即將推出</div>
        </div>
      </div>
      <div class="sub-card disabled">
        <div class="sub-card-icon color-peds">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
        </div>
        <div>
          <div class="sub-card-name">兒童心臟</div>
          <div class="sub-card-count">即將推出</div>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
